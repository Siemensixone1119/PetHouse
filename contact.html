<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>
    <script src="https://api-maps.yandex.ru/v3/?apikey=c6ac5170-c2ba-44b3-a44c-0ce2d69a1241&lang=ru_RU" defer></script>
    <script src="./scripts/initMap.js" defer></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>

<body>
    <header class="header container">
        <div>
            <a href="./index.html" class="logo">
                <span>
                    <svg class="logo__icon">
                        <use href="./images/sprite.svg#icon-paw-print"></use>
                    </svg>
                </span>
                <span class="logo__text">PetHouse</span>
            </a>
        </div>

        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="./about.html">
                        <span class="nav__text">
                            О нас
                        </span>
                    </a>
                </li>
                <li class="nav__item">
                    <a href="./comments.html">
                        <span class="nav__text">
                            Отзывы
                        </span>
                    </a>
                </li>
                <li class="nav__item">
                    <a href="./contact.html">
                        <span class="nav__text">
                            Контакты
                        </span>
                    </a>
                </li>
                <li class="nav__item">
                    <a href="./register.html">
                        <span class="nav__text">
                            Регистрация
                        </span>
                    </a>
                </li>
                <li>
                <button class="join_us__lost-button" type="button" id="openLostModal">
            Сообщить о пропаже
          </button></li>
            </ul>
        </nav>
    </header>
    <main class="contact container">
        <div class="contact__container">
            <div class="contact__content">
                <h1 class="contact__title">Наши офисы</h1>
                <div class="contact__offices">
                    <article class="contact__office office-card">
                        <h2 class="office-card__title">Пенза</h2>

                        <ul class="office-card__list">
                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-map-pin" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <span class="office-card__text">улица Пушкина, 137</span>
                            </li>

                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-phone" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <a href="tel:929956" class="office-card__text">92 99 56</a>
                            </li>

                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-mail" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <a href="mailto:pet_house_penza@mail.ru"
                                    class="office-card__text">pet_house_penza@mail.ru</a>
                            </li>
                        </ul>
                    </article>

                    <article class="contact__office office-card">
                        <h2 class="office-card__title">Заречный</h2>

                        <ul class="office-card__list">
                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-map-pin" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <span class="office-card__text">улица Ленина, 12</span>
                            </li>

                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-phone" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <a href="tel:929956" class="office-card__text">92 98 86</a>
                            </li>

                            <li class="office-card__item">
                                <svg class="office-card__icon">
                                    <use href="./images/sprite.svg#icon-mail" stroke="#3D2B1F" fill="transparent">
                                    </use>
                                </svg>
                                <a href="mailto:pet_house_zarechny@mail.ru"
                                    class="office-card__text">pet_house_zarechny@mail.ru</a>
                            </li>
                        </ul>
                    </article>
                </div>
            </div>
            <div class="contact__map">
                <div class="map__content" id="map"></div>
            </div>
        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <div>
                <a href="" class="logo">
                    <span>
                        <svg class="logo__icon">
                            <use href="./images/sprite.svg#icon-paw-print"></use>
                        </svg>
                    </span>
                    <span class="logo__text">PetHouse</span>
                </a>
            </div>

            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="">
                            <span class="nav__text">
                                Конфидециальность
                            </span>
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="">
                            <span class="nav__text">
                                Условия
                            </span>
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="">
                            <span class="nav__text">
                                Помощь
                            </span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </footer>
    <div class="modal" id="lostModal">
      <div class="modal__overlay" id="closeLostModal"></div>

      <div class="modal__content">
        <button class="modal__close" type="button" id="modalCloseButton">
          ×
        </button>

        <h2 class="modal__title">Сообщить о пропаже</h2>

        <form class="lost-form" id="lostPetForm">
          <div class="lost-form__field">
            <label for="owner">Ваше имя</label>
            <input
              type="text"
              id="owner"
              name="owner"
              placeholder="Например, Анна"
            />
            <span class="lost-form__error" data-error="owner"></span>
          </div>

          <div class="lost-form__field">
            <label for="pet">Вид питомца</label>
            <input
              type="text"
              id="pet"
              name="pet"
              placeholder="Например, кошка"
            />
            <span class="lost-form__error" data-error="pet"></span>
          </div>

          <div class="lost-form__field">
            <label for="petName">Кличка питомца</label>
            <input
              type="text"
              id="petName"
              name="petName"
              placeholder="Например, Муся"
            />
            <span class="lost-form__error" data-error="petName"></span>
          </div>

          <div class="lost-form__field">
            <label for="city">Город</label>
            <input
              type="text"
              id="city"
              name="city"
              placeholder="Например, Пенза"
            />
            <span class="lost-form__error" data-error="city"></span>
          </div>

          <div class="lost-form__field">
            <label for="contact">Контакт</label>
            <input
              type="text"
              id="contact"
              name="contact"
              placeholder="Телефон или email"
            />
            <span class="lost-form__error" data-error="contact"></span>
          </div>

          <div class="lost-form__field">
            <label for="description">Описание</label>
            <textarea
              id="description"
              name="description"
              placeholder="Опишите питомца и место пропажи"
            ></textarea>
            <span class="lost-form__error" data-error="description"></span>
          </div>

          <p class="lost-form__message" id="lostFormMessage"></p>

          <button class="lost-form__button" type="submit">
            Отправить объявление
          </button>
        </form>
      </div>
    </div>
    <script src="./scripts/lost-pets.js"></script>
</body>

</html>
